<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Core Universe</title>
    
    <meta property="fc:frame:manifest" content="https://base-game-alpha.vercel.app/.well-known/farcaster.json" />

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-hud">
        <div class="hud-top">
            <div class="pilot-info">
                <span class="pulse-dot"></span>
                <span id="wallet-display">CONNECTING...</span>
            </div>
            <div id="weapon-status" class="tier-1">TIER 1</div>
        </div>
        
        <div class="hud-bottom">
            <div class="bar-container">
                <span class="bar-label">HULL HP</span>
                <div class="bar-bg">
                    <div id="hp-bar-fill" style="width: 100%;"></div>
                </div>
            </div>
            <div class="bar-container">
                <span class="bar-label">ENERGY CORE</span>
                <div class="bar-bg">
                    <div id="progress-bar-fill" style="width: 0%;"></div>
                </div>
                <div id="score-text"><span id="score-val">0000 / 0050</span></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="joystick-container">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <div id="game-over-screen" class="hidden">
        <div class="terminal-box">
            <h1 id="game-title-end">SHIP DESTROYED</h1>
            <p id="game-sub-end">Hệ thống động cơ bị nổ tung.</p>
            
            <div class="stats-group">
                <div class="stat-item">
                    <span class="stat-lbl">CORE SCORE</span>
                    <span id="final-score" class="stat-num">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-lbl">REACHED WEAPON</span>
                    <span id="final-tier" class="stat-num">TIER 1</span>
                </div>
            </div>

            <div class="fee-notice">
                <p>Phí nạp năng lượng tái sinh phi thuyền: <strong>0.0000003 ETH</strong> (Mạng Base)</p>
                <p>Điểm trận đấu của bạn: <span id="user-live-score" style="color: #00ffff; font-weight: bold;">0</span></p>
            </div>

            <button id="restart-btn">REBOOT ENGINE</button>
            
            <div id="sign-status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@0.0.17/dist/index.min.js"></script>
    
    <script src="game.js"></script>

</body>
</html>
